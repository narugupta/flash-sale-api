version: "3.8"

services:

  postgres:
    image: postgres:15
    container_name: flashsale_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: flashsale
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  redis:
    image: redis:7
    container_name: flashsale_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  
  

